<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Güneş Paneli Verimlilik Analizi</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background: #f0f2f5; color: #1c1e21; margin: 0; padding: 20px; }
        .card { background: white; padding: 30px; margin: 40px auto; max-width: 400px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); border-top: 8px solid #3498db; transition: all 0.3s ease; }
        .status-normal { color: #2ecc71; font-weight: bold; font-size: 1.4em; }
        .status-alert { color: #e74c3c; font-weight: bold; font-size: 1.4em; }
        h1 { color: #2c3e50; font-size: 1.8em; }
        hr { border: 0; border-top: 1px solid #eee; margin: 20px 0; }
        .refresh-text { font-size: 0.8em; color: #95a5a6; margin-top: 15px; }
    </style>
</head>
<body>
    <h1>☀️ Akıllı Enerji İzleme Sistemi</h1>
    <div id="data-container">
        <div class="card">🔄 Veriler Supabase Bulutundan Çekiliyor...</div>
    </div>

    <script>
        // SADECE BU İKİSİNİ KONTROL ET (Resimdekiyle Birebir Aynı)
        const URL = "https://fpksboxxaxyyinvttamp.supabase.co/rest/v1/panel_verileri?select=*&order=id.desc&limit=1";
        const KEY = "sb_publishable_3tnbrWsfMEO77J9APn2fA_kDYNgku5"; 

        async function veriCek() {
            try {
                const res = await fetch(URL, {
                    headers: { "apikey": KEY, "Authorization": "Bearer " + KEY }
                });
                
                if (!res.ok) throw new Error("Hata Kodu: " + res.status);
                
                const data = await res.json();
                if (data.length === 0) throw new Error("Veri bulunamadı.");

                const son = data[0];
                const isNormal = son.durum.includes("NORMAL");

                document.getElementById('data-container').innerHTML = `
                    <div class="card" style="border-top-color: ${isNormal ? '#2ecc71' : '#e74c3c'}">
                        <p style="font-size: 0.9em; color: #7f8c8d; margin-bottom: 5px;">Panel ID: #${son.id}</p>
                        <h2 style="margin: 10px 0;">Işık Şiddeti: %${son.isik_seviyesi}</h2>
                        <div class="${isNormal ? 'status-normal' : 'status-alert'}">
                            ${isNormal ? '✅ SİSTEM NORMAL' : '⚠️ ARIZA TESPİT EDİLDİ'}
                        </div>
                        <p>Akım Üretimi: <b>${son.uretim_amper}A</b></p>
                        <hr>
                        <p style="font-size: 0.85em; color: #34495e;">${son.durum}</p>
                        <div class="refresh-text">Son Güncelleme: ${new Date(son.created_at).toLocaleString('tr-TR')}</div>
                    </div>
                `;
            } catch (err) {
                document.getElementById('data-container').innerHTML = `
                    <div class="card" style="border-top-color: #e74c3c">
                        <h3 style="color: #e74c3c">⚠️ Bağlantı Hatası</h3>
                        <p>${err.message}</p>
                        <small>Lütfen Supabase API Key'i ve Tablo İzinlerini Kontrol Edin.</small>
                    </div>
                `;
            }
        }

        setInterval(veriCek, 5000); // 5 saniyede bir otomatik yenile
        veriCek();
    </script>
</body>
</html>
