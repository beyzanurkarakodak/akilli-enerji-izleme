<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Güneş Paneli Verimlilik Analizi</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f4f4; }
        .card { background: white; padding: 20px; margin: 20px auto; width: 300px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .status-normal { color: green; font-weight: bold; }
        .status-alert { color: red; font-weight: bold; }
    </style>
</head>
<body>
    <h1>Canlı Panel İzleme Sistemi</h1>
    <div id="data-container">Veriler yükleniyor...</div>

    <script>
        const SUPABASE_URL = "https://fpksboxxaxyyinvttamp.supabase.co/rest/v1/panel_verileri?select=*&order=id.desc&limit=1";
        const SUPABASE_KEY = "sb_publishable_3tnbrWsfMEO77J9APn2fA_kDYNgku5";

        async function verileriGetir() {
            try {
                const response = await fetch(SUPABASE_URL, {
                    headers: { "apikey": SUPABASE_KEY, "Authorization": "Bearer " + SUPABASE_KEY }
                });
                const data = await response.json();
                const sonVeri = data[0];

                document.getElementById('data-container').innerHTML = `
                    <div class="card">
                        <h3>Işık Seviyesi: %${sonVeri.isik_seviyesi}</h3>
                        <p>Durum: <span class="${sonVeri.durum === 'NORMAL' ? 'status-normal' : 'status-alert'}">${sonVeri.durum}</span></p>
                        <small>Son Güncelleme: ${new Date(sonVeri.created_at).toLocaleString('tr-TR')}</small>
                    </div>
                `;
            } catch (error) {
                console.error("Hata:", error);
            }
        }

        setInterval(verileriGetir, 5000); // 5 saniyede bir güncelle
        verileriGetir();
    </script>
</body>
</html>
